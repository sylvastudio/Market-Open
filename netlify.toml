[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[[redirects]]
  from = "/api/market-indices"
  to = "/.netlify/functions/market-indices"
  status = 200

[[redirects]]
  from = "/api/gainers-losers"
  to = "/.netlify/functions/gainers-losers"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
